<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vagabond</title>

  <meta name="description" content="Every creation begins as an idea. But ideas are everywhere — expression is rare.">

  <link rel="stylesheet" href="/assets/css/style.css">

  <!-- Theme -->
  <script src="/assets/js/theme.js"></script>

  <!-- Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="container">
      <div class="header-inner">
        <a href="/" class="site-title">The Vagabond</a>
        <nav>
          <a href="/stories/">Stories</a>
          <a href="/poems/">Poems</a>
          <a href="/ideas/">Ideas</a>
          <a href="/about.html">About</a>
          <button class="theme-toggle" aria-label="Toggle theme">☀</button>
        </nav>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="container">
        <p class="hero-text">
          Navigating the noise;<br><br>
          politics, stories, poetry & ideas<br><br>
          for people who still believe words matter.<span class="compass">🧭</span>
        </p>
      </div>
    </section>

    <!-- POSTS -->
    <section class="posts-section">
      <div class="container">
        <p class="section-label">Latest</p>

        <div class="post-grid" id="latest-posts">
          <p class="loading">Loading…</p>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">The Vagabond</span>
       <div class="social-links">
  <a href="https://twitter.com/The_Vagabond98" target="_blank">Twitter</a>
  <a href="https://instagram.com/the_vagabond_98" target="_blank">Instagram</a>
       </div>
      </div>
    </div>
  </footer>

  <!-- ✅ NETLIFY IDENTITY FIX (CRITICAL) -->
  <script>
    if (window.netlifyIdentity) {

      // Redirect after login
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });

      // ✅ Handle email confirmation + invite links
      window.netlifyIdentity.on("init", () => {
        if (
          window.location.hash.includes("confirmation_token") ||
          window.location.hash.includes("invite_token")
        ) {
          window.netlifyIdentity.open();
        }
      });

    }
  </script>

  <!-- SITE SCRIPTS -->
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/main.js"></script>

</body>
</html>
